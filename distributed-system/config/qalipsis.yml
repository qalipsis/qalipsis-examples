logging:
  console: false
  root: WARN
  level:
    events: 'INFO'
    io.qalipsis: 'INFO'
    'org.elasticsearch.client.RestClient': ERROR

datasource:
  host: localhost
  port: 25432
  database: qalipsis
  schema: qalipsis
  username: qalipsis_demo
  password: qalipsis

# For the executors:
# - 0 or less means the Kotlin Global Scope
# - 1 or more means a fixed thread execution context with the number of threads - cannot be less than 2
# - 1.5x means 1.5 times the number of cores, rounded to the next integer if required - cannot be less than 2
# - name of another executor to reuse it
executors:
  global: 0
  campaign: 2x
  io: 2x
  background: 4
  orchestration: 4

meters:
  export:
    enabled: true
    timer:
      percentiles:
        - 95.0
        - 99.0
    campaign-step: PT2S
    elasticsearch:
      hosts: http://localhost:9200
      enabled: true
      index: qalipsis-meters
      store-source: true
      index-date-format: yyyy-MM-dd
    influxdb:
      url: http://localhost:18086
      enabled: true
      org: qalipsis
      bucket: iot
      prefix: qalipsis
      user-name: qalipsis
      password: qalipsis
    timescaledb:
      enabled: true
      host: localhost
      port: 25432
      database: qalipsis
      schema: meters
      username: qalipsis_demo
      password: qalipsis
  provider:
    timescaledb:
      enabled: true
      host: localhost
      port: 25432
      database: qalipsis
      schema: meters
      username: qalipsis_demo
      password: qalipsis
      init-schema: true

events:
  root: TRACE
  export:
    enabled: true
    elasticsearch:
      enabled: true
      urls: http://localhost:9200
      min-level: trace
      store-source: true
      publishers: 1
      batch-size: 2000
    influxdb:
      url: http://localhost:18086
      enabled: true
      min-level: trace
      linger-period: 10s
      batch-size: 2000
      publishers: 1
      username: qalipsis
      password: qalipsis
      org: qalipsis
      bucket: iot
    timescaledb:
      enabled: true
      host: localhost
      port: 25432
      database: qalipsis
      schema: events
      username: qalipsis_demo
      password: qalipsis
    slf4j:
      enabled: false
      min-level: trace

campaign:
  minions-count-per-scenario: 1000
  minions-factor: 1
  speed-factor: 1
  start-offset: 2000ms
  name: distributed-system-${random.shortuuid}

http:
  server:
    url: https://localhost:18443
  client:
    pool:
      size: 0

kafka:
  bootstrap: localhost:19092

jdbc:
  url: jdbc:postgresql://localhost:25432/qalipsis
  port: 25432
  database: qalipsis
  username: qalipsis_demo
  password: qalipsis

report:
  export:
    console-live:
      enabled: true