## Global settings
namespace: qalipsis

## Elasticsearch
elasticsearch:
  enabled: true
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "7.17.21"
  replicas: 1
  javaOpts: "-Xms256m -Xmx256m"
  service:
    type: ClusterIP
    port: 9200
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

## Kibana
kibana:
  enabled: true
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: "7.17.21"
  replicas: 1
  service:
    type: ClusterIP
    port: 5601
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

## Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "latest"
  replicas: 1
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 250m

## Redpanda (Kafka-compatible broker)
redpanda:
  enabled: true
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: "v24.1.3"
  replicas: 1
  service:
    type: ClusterIP
    kafkaPort: 9092
    schemaRegistryPort: 8081
    pandaproxyPort: 8082
    adminPort: 9644
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m

## Redpanda Console
redpandaConsole:
  enabled: true
  image:
    repository: docker.redpanda.com/redpandadata/console
    tag: "v2.5.2"
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

## TimescaleDB (PostgreSQL)
timescale:
  enabled: true
  image:
    repository: timescale/timescaledb
    tag: "latest-pg16"
  replicas: 1
  postgres:
    user: qalipsis_demo
    password: qalipsis
    database: qalipsis
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

## pgAdmin
pgadmin:
  enabled: true
  image:
    repository: dpage/pgadmin4
    tag: "latest"
  replicas: 1
  defaultEmail: qalipsis@qalipsis.com
  defaultPassword: qalipsis
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

## HTTP to Kafka bridge
httpToKafka:
  enabled: true
  image:
    repository: aerisconsulting/http-to-kafka
    tag: "latest"
  replicas: 1
  kafka:
    topic: http-request
  https:
    enabled: true
  service:
    type: ClusterIP
    httpPort: 8080
    httpsPort: 8443
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

## Kafka to DB microservice
kafkaToDb:
  enabled: true
  image:
    repository: aerisconsulting/qalipsis-demo-microservice
    tag: "0.1.1"
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

## InfluxDB
influxdb:
  enabled: true
  image:
    repository: influxdb
    tag: "latest"
  replicas: 1
  init:
    username: qalipsis
    password: qalipsis
    org: qalipsis
    bucket: iot
    adminToken: qalipsis
  service:
    type: ClusterIP
    port: 8086
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

## NGINX reverse proxy
nginx:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
  replicas: 1
  service:
    type: NodePort
    httpPort: 80
    httpsPort: 443
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m
