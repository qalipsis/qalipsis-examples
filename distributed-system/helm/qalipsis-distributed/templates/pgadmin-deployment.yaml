{ { - if .Values.pgadmin.enabled } }
apiVersion: apps/v1
kind: Deployment
metadata:
  name: { { include "qalipsis.fullname" . } }-pgadmin
  labels:
    {{- include "qalipsis.labels" . | nindent 4 }}
    {{- include "qalipsis.selectorLabels" (dict "Release" .Release "component" "pgadmin") | nindent 4 }}
spec:
  replicas: { { .Values.pgadmin.replicas } }
  selector:
    matchLabels:
      { { - include "qalipsis.selectorLabels" (dict "Release" .Release "component" "pgadmin") | nindent 6 } }
  template:
    metadata:
      labels:
        { { - include "qalipsis.labels" . | nindent 8 } }
          { { - include "qalipsis.selectorLabels" (dict "Release" .Release "component" "pgadmin") | nindent 8 } }
    spec:
      initContainers:
        - name: wait-for-timescale
          image: busybox:1.36
          command: [ 'sh', '-c', 'until nc -z {{ include "qalipsis.fullname" . }}-timescale {{ .Values.timescale.service.port }}; do echo waiting for timescale; sleep 2; done' ]
      containers:
        - name: pgadmin
          image: "{{ .Values.pgadmin.image.repository }}:{{ .Values.pgadmin.image.tag }}"
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "False"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
            - name: PGADMIN_DEFAULT_EMAIL
              value: { { .Values.pgadmin.defaultEmail | quote } }
            - name: PGADMIN_DEFAULT_PASSWORD
              value: { { .Values.pgadmin.defaultPassword | quote } }
          resources:
            { { - toYaml .Values.pgadmin.resources | nindent 12 } }
          volumeMounts:
            - name: servers-config
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
      volumes:
        - name: servers-config
          configMap:
            name: { { include "qalipsis.fullname" . } }-pgadmin
  { { - end } }
