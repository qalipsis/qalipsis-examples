{ { - if and .Values.influxdb.enabled .Values.influxdb.persistence.enabled } }
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: { { include "qalipsis.fullname" . } }-influxdb
  labels:
    {{- include "qalipsis.labels" . | nindent 4 }}
    {{- include "qalipsis.selectorLabels" (dict "Release" .Release "component" "influxdb") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: { { .Values.influxdb.persistence.size } }
  { { - if .Values.influxdb.persistence.storageClass } }
  storageClassName: { { .Values.influxdb.persistence.storageClass } }
  { { - end } }
  { { - end } }
