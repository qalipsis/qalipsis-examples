{ { - if .Values.influxdb.enabled } }
apiVersion: v1
kind: Secret
metadata:
  name: { { include "qalipsis.fullname" . } }-influxdb
  labels:
    {{- include "qalipsis.labels" . | nindent 4 }}
    {{- include "qalipsis.selectorLabels" (dict "Release" .Release "component" "influxdb") | nindent 4 }}
type: Opaque
data:
  admin-password: { { .Values.influxdb.init.password | b64enc | quote } }
  admin-token: { { .Values.influxdb.init.adminToken | b64enc | quote } }
  { { - end } }
