{ { - if .Values.elasticsearch.enabled } }
apiVersion: v1
kind: Service
metadata:
  name: { { include "qalipsis.fullname" . } }-elasticsearch
  labels:
    {{- include "qalipsis.labels" . | nindent 4 }}
    {{- include "qalipsis.selectorLabels" (dict "Release" .Release "component" "elasticsearch") | nindent 4 }}
spec:
  type: { { .Values.elasticsearch.service.type } }
  ports:
    - port: { { .Values.elasticsearch.service.port } }
      targetPort: 9200
      protocol: TCP
      name: http
  selector:
    { { - include "qalipsis.selectorLabels" (dict "Release" .Release "component" "elasticsearch") | nindent 4 } }
  { { - end } }
