{ { - if .Values.timescale.enabled } }
apiVersion: v1
kind: Service
metadata:
  name: { { include "qalipsis.fullname" . } }-timescale
  labels:
    {{- include "qalipsis.labels" . | nindent 4 }}
    {{- include "qalipsis.selectorLabels" (dict "Release" .Release "component" "timescale") | nindent 4 }}
spec:
  type: { { .Values.timescale.service.type } }
  ports:
    - port: { { .Values.timescale.service.port } }
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    { { - include "qalipsis.selectorLabels" (dict "Release" .Release "component" "timescale") | nindent 4 } }
  { { - end } }
